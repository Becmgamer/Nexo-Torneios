<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grix Studios</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0f0f0f;
color:white;
text-align:center;
}

.container{
margin-top:40px;
}

input{
display:block;
margin:10px auto;
padding:10px;
width:250px;
border-radius:5px;
border:none;
outline:none;
background:#1c1c1c;
color:white;
border:1px solid #00ff88;
}

button{
padding:10px 20px;
margin:5px;
border:none;
border-radius:5px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

.primary{
background:#00ff88;
color:black;
}

.primary:hover{
background:#00ccff;
color:white;
box-shadow:0 0 10px #00ccff;
}

.secondary{
background:#00ccff;
color:black;
}

.secondary:hover{
background:#00ff88;
box-shadow:0 0 10px #00ff88;
}

.hidden{
display:none;
}

.card{
background:#1a1a1a;
padding:20px;
margin:20px auto;
width:300px;
border-radius:10px;
border:1px solid #00ff88;
box-shadow:0 0 15px rgba(0,255,136,0.3);
}
</style>
</head>

<body>

<div class="container" id="loginArea">

<h2>Grix Studios Login</h2>

<input type="text" id="nome" placeholder="Nome">
<input type="text" id="username" placeholder="Username">
<input type="email" id="email" placeholder="Email">
<input type="password" id="senha" placeholder="Senha">
<input type="text" id="telefone" placeholder="Telefone">

<button class="primary" onclick="criarConta()">Criar Conta</button>
<button class="secondary" onclick="entrar()">Entrar</button>

</div>

<div class="container hidden" id="torneiosArea">

<h2>Grix Studios Torneios</h2>

<div class="card">

<img src="https://i.postimg.cc/rF4pYH4w/unnamed.png" width="150"><br><br>

<h3>Clash Royale Cup GS</h3>

<p><b>Data do torneio:</b><br>
13 de março às 16:30</p>

<p>Taxa de entrada: R$0,50</p>

<p>🏆 Prêmios</p>

<p>
1º Lugar R$5,00<br>
2º Lugar R$3,00<br>
3º Lugar R$1,00
</p>

<p>
<b>Jogadores:</b><br>
Mínimo: 8<br>
Máximo: 32
</p>

<p id="contador">Carregando jogadores...</p>

<button class="primary" onclick="pagarPix()">Pagar via Pix</button>
<button class="secondary" onclick="pagarPessoal()">Pagar pessoalmente</button>

<br><br>

<button class="secondary" onclick="voltarInicio()">Voltar para aba inicial</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
setPersistence,
browserLocalPersistence,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getDatabase,
ref,
set,
get,
child
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {

apiKey: "SUA_API",
authDomain: "SEU_AUTH",
databaseURL: "SEU_DATABASE",
projectId: "SEU_PROJECT",
storageBucket: "SEU_BUCKET",
messagingSenderId: "SEU_ID",
appId: "SEU_APP"

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const database = getDatabase(app);

setPersistence(auth, browserLocalPersistence);

const maxJogadores = 32;

function atualizarContador(){

get(child(ref(database),"inscricoes")).then((snapshot)=>{

let total = snapshot.exists() ? Object.keys(snapshot.val()).length : 0;

document.getElementById("contador").innerText =
"Jogadores inscritos: "+total+" / "+maxJogadores;

});

}

window.criarConta = function(){

const nome = document.getElementById("nome").value;
const username = document.getElementById("username").value;
const email = document.getElementById("email").value;
const senha = document.getElementById("senha").value;
const telefone = document.getElementById("telefone").value;

createUserWithEmailAndPassword(auth,email,senha)

.then((userCredential)=>{

const user = userCredential.user;

set(ref(database,"usuarios/"+user.uid),{

nome:nome,
username:username,
email:email,
telefone:telefone,
aprovado:false

});

alert("Conta criada!");

})

.catch(error=>{

alert(error.message);

});

}

window.entrar = function(){

const email = document.getElementById("email").value;
const senha = document.getElementById("senha").value;

signInWithEmailAndPassword(auth,email,senha)

.then(()=>{

localStorage.setItem("loginTime",Date.now());

})

.catch(error=>{

alert(error.message);

});

}

const tempoSalvo = localStorage.getItem("loginTime");

if(tempoSalvo){

const umaSemana = 7*24*60*60*1000;

if(Date.now() - tempoSalvo > umaSemana){

signOut(auth);
localStorage.removeItem("loginTime");

}

}

onAuthStateChanged(auth,(user)=>{

if(user){

document.getElementById("loginArea").classList.add("hidden");
document.getElementById("torneiosArea").classList.remove("hidden");

atualizarContador();

}

});

function registrarInscricao(metodo){

const user = auth.currentUser;

get(child(ref(database),"inscricoes")).then((snapshot)=>{

let total = snapshot.exists() ? Object.keys(snapshot.val()).length : 0;

if(total >= maxJogadores){

alert("Torneio lotado!");
return;

}

set(ref(database,"inscricoes/"+user.uid),{

torneio:"Clash Royale Cup GS",
metodo:metodo,
status:"Aguardando confirmação",
data:new Date().toISOString()

});

alert("Inscrição registrada!");

atualizarContador();

});

}

window.pagarPix = function(){

registrarInscricao("Pix");

const chavePix = "Bernardmachado14@gmail.com";

navigator.clipboard.writeText(chavePix);

alert("Chave Pix copiada automaticamente!\n\n"+chavePix);

}

window.pagarPessoal = function(){

registrarInscricao("Presencial");

alert("Pagamento presencial registrado.\nAguarde até 24 horas para confirmação.");

}

window.voltarInicio = function(){

window.location.href="https://sites.google.com/view/nexostudios/in%C3%ADcio";

}

</script>

</body>
</html>
