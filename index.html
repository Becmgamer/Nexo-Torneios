<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Torneio Grix Studios</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

.container{
background:#1e293b;
padding:20px;
margin:auto;
margin-top:40px;
width:350px;
border-radius:10px;
}

input,select{
width:90%;
padding:10px;
margin:5px;
border-radius:5px;
border:none;
}

button{
padding:10px 20px;
margin:5px;
border:none;
border-radius:5px;
background:#38bdf8;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>Inscrição no Torneio</h2>

<input id="nome" placeholder="Nome"><br>
<input id="email" placeholder="Email"><br>
<input id="telefone" placeholder="Telefone"><br>

<select id="plano">

<option value="APK">Plano APK</option>
<option value="APKD">Plano APKD</option>
<option value="Mensal">Plano Mensal</option>

</select>

<br>

<select id="pagamento">

<option value="pix">Pagar via Pix</option>
<option value="presencial">Pagar pessoalmente</option>

</select>

<br><br>

<button onclick="inscrever()">Participar do Torneio</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "COLOQUE_SUA_API_KEY",
authDomain: "SEU_PROJETO.firebaseapp.com",
projectId: "SEU_PROJECT_ID",
storageBucket: "SEU_BUCKET",
messagingSenderId: "SEU_ID",
appId: "SEU_APP_ID"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function inscrever(){

let nome = document.getElementById("nome").value;
let email = document.getElementById("email").value;
let telefone = document.getElementById("telefone").value;
let plano = document.getElementById("plano").value;
let pagamento = document.getElementById("pagamento").value;

await addDoc(collection(db,"torneios"),{

nome:nome,
email:email,
telefone:telefone,
plano:plano,
pagamento:pagamento,
data:new Date()

});

alert("Inscrição enviada! Aguarde aprovação.");

}

</script>

</body>
</html>
