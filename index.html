<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grix Studios</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
text-align:center;
}

.container{
margin-top:40px;
}

input{

display:block;
margin:10px auto;
padding:10px;
width:250px;

background:#1c1c1c;
color:white;

border:1px solid #00ff88;
border-radius:6px;

}

button{

padding:10px 20px;
margin:5px;
border:none;
border-radius:6px;
cursor:pointer;

}

.primary{

background:#00ff88;
color:black;

}

.secondary{

background:#00ccff;
color:black;

}

.hidden{

display:none;

}

.card{

background:#1a1a1a;
padding:20px;
width:300px;
margin:auto;
border-radius:10px;
border:1px solid #00ff88;

}

</style>

</head>

<body>

<div id="loginArea" class="container">

<h2>Login Grix Studios</h2>

<input id="nome" placeholder="Nome">
<input id="username" placeholder="Username">
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">
<input id="telefone" placeholder="Telefone">

<button class="primary" onclick="criarConta()">Criar Conta</button>

<button class="secondary" onclick="entrar()">Entrar</button>

</div>

<div id="torneioArea" class="container hidden">

<h2>Torneios</h2>

<div class="card">

<h3>Clash Royale Cup</h3>

<p>Entrada: R$0,50</p>

<p>

1º lugar: R$5  
<br>
2º lugar: R$3  
<br>
3º lugar: R$1

</p>

<p id="contador">Carregando...</p>

<button class="primary" onclick="pagarPix()">Pagar via Pix</button>

<button class="secondary" onclick="pagarPessoal()">Pagar pessoalmente</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {

getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
setPersistence,
browserLocalPersistence,
signOut

} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {

getDatabase,
ref,
set,
get,
child

} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {

apiKey:"SUA_API",
authDomain:"SEU_AUTH",
databaseURL:"SEU_DATABASE",
projectId:"SEU_PROJECT",
storageBucket:"SEU_BUCKET",
messagingSenderId:"SEU_ID",
appId:"SEU_APP"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const database = getDatabase(app);

setPersistence(auth,browserLocalPersistence);

const maxJogadores = 32;

function atualizarContador(){

get(child(ref(database),"inscricoes"))

.then((snapshot)=>{

let total = snapshot.exists()

? Object.keys(snapshot.val()).length

: 0;

document.getElementById("contador").innerText =
"Jogadores: "+total+" / "+maxJogadores;

});

}

window.criarConta = function(){

const nome = document.getElementById("nome").value;

const username = document.getElementById("username").value;

const email = document.getElementById("email").value;

const senha = document.getElementById("senha").value;

const telefone = document.getElementById("telefone").value;

createUserWithEmailAndPassword(auth,email,senha)

.then((userCredential)=>{

const user = userCredential.user;

set(ref(database,"usuarios/"+user.uid),{

nome:nome,
username:username,
email:email,
telefone:telefone

});

alert("Conta criada!");

})

.catch((error)=>{

alert(error.message);

});

};

window.entrar = function(){

const email = document.getElementById("email").value;

const senha = document.getElementById("senha").value;

signInWithEmailAndPassword(auth,email,senha)

.then(()=>{

localStorage.setItem("loginTime",Date.now());

})

.catch((error)=>{

alert(error.message);

});

};

const tempo = localStorage.getItem("loginTime");

if(tempo){

const semana = 7*24*60*60*1000;

if(Date.now() - tempo > semana){

signOut(auth);

localStorage.removeItem("loginTime");

}

}

onAuthStateChanged(auth,(user)=>{

if(user){

document.getElementById("loginArea").classList.add("hidden");

document.getElementById("torneioArea").classList.remove("hidden");

atualizarContador();

}

});

function registrar(metodo){

const user = auth.currentUser;

get(child(ref(database),"inscricoes"))

.then((snapshot)=>{

let total = snapshot.exists()

? Object.keys(snapshot.val()).length

: 0;

if(total >= maxJogadores){

alert("Torneio lotado!");

return;

}

set(ref(database,"inscricoes/"+user.uid),{

torneio:"Clash Royale Cup",
metodo:metodo,
status:"Aguardando",
data:new Date().toISOString()

});

alert("Inscrição registrada!");

atualizarContador();

});

}

window.pagarPix = function(){

registrar("Pix");

const chave = "Bernardmachado14@gmail.com";

navigator.clipboard.writeText(chave);

alert("Pix copiado:\n"+chave);

};

window.pagarPessoal = function(){

registrar("Presencial");

alert("Pagamento presencial registrado.");

};

</script>

</body>
</html>
