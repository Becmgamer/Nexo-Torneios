<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grix Studios</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
text-align:center;
}

input{
display:block;
margin:10px auto;
padding:10px;
width:250px;
background:#1c1c1c;
color:white;
border:1px solid #00ff88;
border-radius:5px;
}

button{
padding:10px 20px;
margin:5px;
border:none;
border-radius:5px;
cursor:pointer;
}

.primary{
background:#00ff88;
color:black;
}

.secondary{
background:#00ccff;
color:black;
}

.hidden{
display:none;
}

.card{
background:#1a1a1a;
padding:20px;
width:300px;
margin:auto;
border-radius:10px;
border:1px solid #00ff88;
}

</style>

</head>

<body>

<div id="login">

<h2>Login</h2>

<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">

<button class="primary" onclick="entrar()">Entrar</button>

</div>

<div id="torneio" class="hidden">

<div class="card">

<h3>Clash Royale Cup</h3>

<p>Entrada: R$0,50</p>

<p>

1º lugar: R$5  
<br>
2º lugar: R$3  
<br>
3º lugar: R$1

</p>

<button class="primary" onclick="pagarPix()">Pagar Pix</button>

<button class="secondary" onclick="pagarPessoal()">Pagar Pessoalmente</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {

getAuth,
signInWithEmailAndPassword,
onAuthStateChanged

} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {

getDatabase,
ref,
set,
get,
child

} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {

apiKey:"SUA_API",
authDomain:"SEU_AUTH",
databaseURL:"SEU_DATABASE",
projectId:"SEU_PROJECT",
storageBucket:"SEU_BUCKET",
messagingSenderId:"SEU_ID",
appId:"SEU_APP"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const database = getDatabase(app);

/* CONFIGURAÇÃO DO TORNEIO */

const maxJogadores = 32;

/* SE QUISER FECHAR MANUALMENTE */

const torneioFechado = false;

/* LOGIN */

window.entrar = function(){

const email = document.getElementById("email").value;

const senha = document.getElementById("senha").value;

signInWithEmailAndPassword(auth,email,senha)

.catch((error)=>{

alert(error.message);

});

}

/* VERIFICAR LOGIN */

onAuthStateChanged(auth,(user)=>{

if(user){

document.getElementById("login").classList.add("hidden");

document.getElementById("torneio").classList.remove("hidden");

}

});

/* VERIFICAR LIMITE */

async function podeEntrar(){

if(torneioFechado){

alert("Torneio fechado");

return false;

}

const snapshot = await get(child(ref(database),"inscricoes"));

let total = snapshot.exists()

? Object.keys(snapshot.val()).length

: 0;

if(total >= maxJogadores){

alert("Torneio lotado");

return false;

}

return true;

}

/* REGISTRAR */

async function registrar(metodo){

const user = auth.currentUser;

if(!user) return;

const permitido = await podeEntrar();

if(!permitido) return;

set(ref(database,"inscricoes/"+user.uid),{

torneio:"Clash Royale Cup",
metodo:metodo,
status:"Aguardando"

});

alert("Inscrição feita");

}

/* BOTÕES */

window.pagarPix = function(){

registrar("Pix");

const chave = "Bernardmachado14@gmail.com";

navigator.clipboard.writeText(chave);

alert("Pix copiado");

}

window.pagarPessoal = function(){

registrar("Presencial");

alert("Pagamento presencial registrado");

}

</script>

</body>
</html>
